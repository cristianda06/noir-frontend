<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOIR</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="header">
        <nav class="navbar">
            <div class="logo">Noir</div>
            <ul class="nav-links">
                <li><a href="index.html" class="active">Inicio</a></li>
                <li><a href="catalogo.html">Catálogo</a></li>
                <li><a href="carrito.html">Carrito</a></li>
                <li id="navAuth"><a href="login.html">Login</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>NOIR</h1>
            <p>Moda elegante y moderna</p>
            <a href="#productos" class="btn">Comprar ahora</a>
        </div>
    </section>

    <section class="categories">
        <h2 class="section-title">Categorías</h2>
        <div class="categories-container">

            <a href="catalogo.html?categoria=camisetas" class="category-card">
                <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?q=80&w=1170&auto=format&fit=crop" alt="Hombre">
                <h3>Hombre</h3>
            </a>

            <a href="catalogo.html?categoria=hoodies" class="category-card">
                <img src="https://images.unsplash.com/photo-1496747611176-843222e1e57c?q=80&w=1160&auto=format&fit=crop" alt="Mujer">
                <h3>Mujer</h3>
            </a>

            <a href="catalogo.html?categoria=accesorios" class="category-card">
                <img src="https://images.unsplash.com/photo-1529139574466-a303027c1d8b?q=80&w=1160&auto=format&fit=crop" alt="Accesorios">
                <h3>Accesorios</h3>
            </a>

        </div>
    </section>

    <section class="products" id="productos">
        <h2 class="section-title">Productos Destacados</h2>
        <div class="products-container"></div>
    </section>

    <footer class="footer">
        <h2>NOIR</h2>
        <p>Moda premium urbana</p>
        <p>© 2026 <em>Noir</em></p>

        <a href="admin-login.html" id="linkAdmin" style="display:none; font-size:11px; color:#6b6b6b; text-decoration:none; letter-spacing:1px; margin-top:8px;">
            Admin
        </a>
    </footer>

    <script src="js/app.js"></script>

    <a href="carrito.html" class="btn-flotante-carrito">🛒</a>

    <script>
        const usuarioRol    = localStorage.getItem('usuarioRol');
        const usuarioNombre = localStorage.getItem('usuarioNombre');
        const navAuth       = document.getElementById('navAuth');

        if (usuarioRol) {
            navAuth.innerHTML = `<a href="#" onclick="cerrarSesion()">Cerrar sesión</a>`;
        }

        function cerrarSesion() {
            localStorage.removeItem('usuarioId');
            localStorage.removeItem('usuarioRol');
            localStorage.removeItem('usuarioNombre');
            window.location.href = 'login.html';
        }
    </script>

</body>
</html>
