<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo | NOIR</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* ── TOAST BIENVENIDA ── */
        .toast-bienvenida {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: #111;
            color: #fff;
            padding: 12px 28px;
            border-radius: 2px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 15px;
            letter-spacing: 2px;
            white-space: nowrap;
            opacity: 0;
            z-index: 999;
            box-shadow: 0 4px 24px rgba(0,0,0,0.18);
            transition: opacity 0.5s ease, transform 0.5s ease;
            pointer-events: none;
        }

        .toast-bienvenida.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast-bienvenida.oculto {
            opacity: 0;
            transform: translateX(-50%) translateY(-20px);
        }

        /* ── NOMBRE EN NAVBAR ── */
        .nav-usuario {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-usuario-nombre {
            font-family: 'Cormorant Garamond', serif;
            font-size: 14px;
            letter-spacing: 1.5px;
            color: #fff;
            opacity: 0.85;
        }
    </style>
</head>
<body>

    <!-- Toast bienvenida -->
    <div class="toast-bienvenida" id="toastBienvenida"></div>

    <header class="header">
        <nav class="navbar">
            <div class="logo">Noir</div>
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="catalogo.html">Catálogo</a></li>
                <li><a href="carrito.html">Carrito</a></li>
                <li id="navAuth"><a href="login.html">Login</a></li>
            </ul>
        </nav>
    </header>

    <a href="carrito.html" class="floating-cart"></a>

    <h1 class="title">NOIR STORE</h1>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Buscar productos...">
    </div>

    <div class="filters">
        <button onclick="filterProducts('todos')">Todos</button>
        <button onclick="filterProducts('pantalones')">Pantalones</button>
        <button onclick="filterProducts('camisetas')">Camisetas</button>
        <button onclick="filterProducts('hoodies')">Hoodies</button>
        <button onclick="filterProducts('accesorios')">Accesorios</button>
    </div>

    <div id="products-container"></div>

    <script src="js/products.js"></script>
    <script src="js/catalogo.js"></script>

    <a href="carrito.html" class="btn-flotante-carrito">🛒</a>

    <script>
        const usuarioRol    = localStorage.getItem('usuarioRol');
        const usuarioNombre = localStorage.getItem('usuarioNombre');
        const navAuth       = document.getElementById('navAuth');
        const toast         = document.getElementById('toastBienvenida');

        if (usuarioRol) {
            // Navbar con nombre + cerrar sesión
            navAuth.innerHTML = `
                <div class="nav-usuario">
                    <span class="nav-usuario-nombre">${usuarioNombre}</span>
                    <a href="#" onclick="cerrarSesion()">Cerrar sesión</a>
                </div>
            `;

            // Toast solo si viene del login
            const recienLogueado = sessionStorage.getItem('recienLogueado');
            if (recienLogueado) {
                sessionStorage.removeItem('recienLogueado');

                toast.textContent = `Bienvenid@ , ${usuarioNombre}`;

                // Aparecer con animación
                setTimeout(() => toast.classList.add('visible'), 100);

                // Desaparecer después de 5 segundos
                setTimeout(() => {
                    toast.classList.remove('visible');
                    toast.classList.add('oculto');
                }, 5000);
            }
        }

        function cerrarSesion() {
            localStorage.removeItem('usuarioId');
            localStorage.removeItem('usuarioRol');
            localStorage.removeItem('usuarioNombre');
            window.location.href = 'login.html';
        }
    </script>

</body>
</html>
