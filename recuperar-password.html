<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña | NOIR</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

    <section class="form-section">
        <div class="form-container">

            <h1 class="form-logo">NOIR</h1>
            <h2>Recuperar Contraseña</h2>
            <p style="text-align:center; font-size:13px; color:#888; font-family:sans-serif; margin-bottom:16px;">
                Ingresa tu correo y te enviaremos un enlace para restablecer tu contraseña.
            </p>

            <div id="vistaCorreo">
                <input type="email" id="emailRecuperar" placeholder="Correo electrónico">
                <button onclick="enviarCorreo()" style="width:100%; margin-top:10px;">Enviar enlace</button>
                <p id="mensajeRecuperar" style="text-align:center; margin-top:10px; font-size:14px; font-family:sans-serif;"></p>
            </div>

            <div id="vistaNuevaPassword" style="display:none;">
                <p style="text-align:center; font-size:13px; color:#444; font-family:sans-serif; margin-bottom:16px;">
                    Ingresa tu nueva contraseña.
                </p>
                <input type="password" id="nuevaPassword" placeholder="Nueva contraseña">
                <input type="password" id="confirmarPassword" placeholder="Confirmar contraseña" style="margin-top:10px;">
                <button onclick="restablecerPassword()" style="width:100%; margin-top:10px;">Restablecer</button>
                <p id="mensajeRestablecer" style="text-align:center; margin-top:10px; font-size:14px; font-family:sans-serif;"></p>
            </div>

            <p class="extra-link" style="margin-top:16px;">
                <a href="login.html">← Volver al login</a>
            </p>

        </div>
    </section>

    <script>
        let emailGuardado = '';

        async function enviarCorreo() {
            const email   = document.getElementById('emailRecuperar').value.trim();
            const mensaje = document.getElementById('mensajeRecuperar');

            if (!email) { mensaje.style.color = 'red'; mensaje.textContent = 'Ingresa tu correo.'; return; }

            try {
                const res  = await fetch('https://noir-backend-t92y.onrender.com/recuperar-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();

                if (res.ok) {
                    emailGuardado = email;
                    mensaje.style.color = 'green';
                    mensaje.textContent = '✓ Correo verificado. Ahora ingresa tu nueva contraseña.';

                    setTimeout(() => {
                        document.getElementById('vistaCorreo').style.display = 'none';
                        document.getElementById('vistaNuevaPassword').style.display = 'block';
                    }, 1500);
                } else {
                    mensaje.style.color = 'red';
                    mensaje.textContent = data.error || 'Error al verificar el correo.';
                }
            } catch (err) {
                mensaje.style.color = 'red';
                mensaje.textContent = 'Error: El servidor no está respondiendo.';
            }
        }

        async function restablecerPassword() {
            const nuevaPassword    = document.getElementById('nuevaPassword').value.trim();
            const confirmarPassword = document.getElementById('confirmarPassword').value.trim();
            const mensaje           = document.getElementById('mensajeRestablecer');

            if (!nuevaPassword || !confirmarPassword) { mensaje.style.color = 'red'; mensaje.textContent = 'Completa todos los campos.'; return; }
            if (nuevaPassword !== confirmarPassword)  { mensaje.style.color = 'red'; mensaje.textContent = 'Las contraseñas no coinciden.'; return; }

            try {
                const res  = await fetch('https://noir-backend-t92y.onrender.com/restablecer-password', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: emailGuardado, nuevaPassword })
                });
                const data = await res.json();

                if (res.ok) {
                    mensaje.style.color = 'green';
                    mensaje.textContent = '✓ Contraseña restablecida. Redirigiendo...';
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    mensaje.style.color = 'red';
                    mensaje.textContent = data.error || 'Error al restablecer.';
                }
            } catch (err) {
                mensaje.style.color = 'red';
                mensaje.textContent = 'Error: El servidor no está respondiendo.';
            }
        }
    </script>

</body>
</html>
